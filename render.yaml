services:
  - type: web
    name: mearn-fadjma
    env: node
    branch: main
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      # MONGO_URI and JWT_SECRET were removed from the repository for security.
      # Add them in the Render dashboard: Service > Environment > Environment Variables
      - key: MONGO_URI
        value: "<SET_IN_RENDER_DASHBOARD>"
      - key: JWT_SECRET
        value: "<SET_IN_RENDER_DASHBOARD>"
      - key: FRONTEND_URL
        value: "https://mearn-fadjma.onrender.com"
    autoDeploy: true
